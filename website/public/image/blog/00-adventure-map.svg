<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="430" viewBox="0 0 1440 430" role="img" aria-labelledby="title desc">
  <title id="title">The Tree-sitter Rust rewrite adventure</title>
  <desc id="desc">A six-stage path from the ast-grep bottleneck through the Rust rewrite, a dangerous vibe-optimization phase, cleanup, parser optimization, and end-to-end validation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1440" height="430" rx="24" fill="#f8fafc"/>
  <text x="60" y="57" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="27" font-weight="700" fill="#172033">The rewrite worked. The adventure began when “worked” stopped being enough.</text>
  <path d="M 130 210 L 1310 210" stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="30" y="128" width="200" height="164" rx="18" fill="#fff" stroke="#ef4444" stroke-width="3"/>
    <circle cx="130" cy="128" r="28" fill="#ef4444"/>
    <text x="130" y="138" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="27" font-weight="700" fill="#fff">1</text>
    <text x="130" y="181" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="21" font-weight="700" fill="#172033">Bottleneck</text>
    <text x="130" y="217" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">Tree-sitter limits</text>
    <text x="130" y="242" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">ast-grep, but a solo</text>
    <text x="130" y="267" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">rewrite looks absurd</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="260" y="128" width="200" height="164" rx="18" fill="#fff" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="360" cy="128" r="28" fill="#f59e0b"/>
    <text x="360" y="138" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="27" font-weight="700" fill="#fff">2</text>
    <text x="360" y="181" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="21" font-weight="700" fill="#172033">Rewrite</text>
    <text x="360" y="217" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">AI translates C to Rust</text>
    <text x="360" y="242" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">under ABI, parity,</text>
    <text x="360" y="267" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">and test constraints</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="490" y="128" width="200" height="164" rx="18" fill="#fff" stroke="#ec4899" stroke-width="3"/>
    <circle cx="590" cy="128" r="28" fill="#ec4899"/>
    <text x="590" y="138" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="27" font-weight="700" fill="#fff">3</text>
    <text x="590" y="181" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="21" font-weight="700" fill="#172033">Vibe optimize</text>
    <text x="590" y="217" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">“+20%” arrives with</text>
    <text x="590" y="242" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">unreadable code</text>
    <text x="590" y="267" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">and segfaults</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="720" y="128" width="200" height="164" rx="18" fill="#fff" stroke="#10b981" stroke-width="3"/>
    <circle cx="820" cy="128" r="28" fill="#10b981"/>
    <text x="820" y="138" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="27" font-weight="700" fill="#fff">4</text>
    <text x="820" y="181" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="21" font-weight="700" fill="#172033">Regain control</text>
    <text x="820" y="217" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">Delete unused scope;</text>
    <text x="820" y="242" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">rewrite C-style Rust</text>
    <text x="820" y="267" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">for local reasoning</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="950" y="128" width="200" height="164" rx="18" fill="#fff" stroke="#3b82f6" stroke-width="3"/>
    <circle cx="1050" cy="128" r="28" fill="#3b82f6"/>
    <text x="1050" y="138" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="27" font-weight="700" fill="#fff">5</text>
    <text x="1050" y="181" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="21" font-weight="700" fill="#172033">Parser design</text>
    <text x="1050" y="217" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">Lazy GLR + arena;</text>
    <text x="1050" y="242" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">make the common</text>
    <text x="1050" y="267" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">reduction smaller</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1180" y="128" width="200" height="164" rx="18" fill="#fff" stroke="#8b5cf6" stroke-width="3"/>
    <circle cx="1280" cy="128" r="28" fill="#8b5cf6"/>
    <text x="1280" y="138" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="27" font-weight="700" fill="#fff">6</text>
    <text x="1280" y="181" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="21" font-weight="700" fill="#172033">Reality check</text>
    <text x="1280" y="217" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">Faster parser, slower app;</text>
    <text x="1280" y="242" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">trace the lifecycle,</text>
    <text x="1280" y="267" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">then fix the right cost</text>
  </g>

  <text x="720" y="356" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#334155">broad prompt  →  dangerous win  →  readable system  →  precise invariant  →  end-to-end evidence</text>
  <text x="720" y="391" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#64748b">AI made the attempts cheap. Understanding and measurements decided which ones survived.</text>
</svg>
