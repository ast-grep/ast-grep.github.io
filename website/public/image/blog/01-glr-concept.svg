<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="500" viewBox="0 0 1440 500" role="img" aria-labelledby="title desc">
  <title id="title">How a GLR parser shares and resolves multiple histories</title>
  <desc id="desc">A graph-structured stack stores one shared prefix. At a parse-table conflict, logical stack versions fork and advance independently. Impossible versions are discarded and compatible versions can merge.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1440" height="500" rx="24" fill="#f8fafc"/>
  <text x="55" y="55" font-family="ui-sans-serif, system-ui" font-size="28" font-weight="500" fill="#172033">GLR: several logical histories, one shared graph</text>
  <text x="55" y="87" font-family="ui-sans-serif, system-ui" font-size="16" fill="#64748b">A conflict forks stack versions. Each version advances independently until it dies or can merge.</text>

  <text x="205" y="137" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="17" font-weight="500" fill="#334155">SHARED STACK HISTORY</text>
  <text x="205" y="161" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" fill="#64748b">stored once in the GSS</text>
  <line x1="92" y1="250" x2="342" y2="250" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <g filter="url(#shadow)">
    <circle cx="95" cy="250" r="31" fill="#ffffff" stroke="#94a3b8" stroke-width="3"/>
    <circle cx="205" cy="250" r="31" fill="#ffffff" stroke="#94a3b8" stroke-width="3"/>
    <circle cx="315" cy="250" r="31" fill="#ffffff" stroke="#94a3b8" stroke-width="3"/>
  </g>
  <text x="95" y="256" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#334155">state</text>
  <text x="205" y="256" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#334155">state</text>
  <text x="315" y="256" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#334155">state</text>

  <g filter="url(#shadow)">
    <path d="M430 250 L500 188 L570 250 L500 312 Z" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
  </g>
  <text x="500" y="239" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="500" fill="#172033">TABLE</text>
  <text x="500" y="263" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="500" fill="#172033">CONFLICT</text>
  <text x="500" y="338" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" fill="#64748b">more than one valid action</text>
  <path d="M346 250 H430" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="389" y="259" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="29" fill="#64748b">→</text>

  <text x="735" y="126" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="15" font-weight="500" fill="#334155">VERSION A</text>
  <text x="735" y="246" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="15" font-weight="500" fill="#334155">VERSION B</text>
  <text x="735" y="366" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="15" font-weight="500" fill="#334155">VERSION C</text>
  <line x1="570" y1="250" x2="665" y2="171" stroke="#3b82f6" stroke-width="3"/>
  <line x1="570" y1="250" x2="665" y2="291" stroke="#8b5cf6" stroke-width="3"/>
  <line x1="570" y1="250" x2="665" y2="411" stroke="#f59e0b" stroke-width="3"/>

  <g filter="url(#shadow)">
    <rect x="665" y="140" width="140" height="62" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="665" y="260" width="140" height="62" rx="14" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="665" y="380" width="140" height="62" rx="14" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
    <rect x="855" y="125" width="140" height="62" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="855" y="245" width="140" height="62" rx="14" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="855" y="365" width="140" height="62" rx="14" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  </g>
  <text x="735" y="177" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="15" fill="#334155">shift / reduce</text>
  <text x="735" y="297" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="15" fill="#334155">shift / reduce</text>
  <text x="735" y="417" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="15" fill="#334155">shift / reduce</text>
  <text x="925" y="162" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#334155">new state</text>
  <text x="925" y="282" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#334155">new state</text>
  <text x="925" y="402" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#334155">new state</text>
  <path d="M805 171 H855" stroke="#3b82f6" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M805 291 H855" stroke="#8b5cf6" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M805 411 H855" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="830" y="180" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="25" fill="#3b82f6">→</text>
  <text x="830" y="300" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="25" fill="#8b5cf6">→</text>
  <text x="830" y="420" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="25" fill="#f59e0b">→</text>

  <g filter="url(#shadow)">
    <rect x="1080" y="170" width="175" height="104" rx="17" fill="#ecfdf5" stroke="#10b981" stroke-width="3"/>
  </g>
  <text x="1168" y="206" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="500" fill="#172033">MERGE</text>
  <text x="1168" y="232" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" fill="#475569">same state + position</text>
  <text x="1168" y="253" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" fill="#475569">share one head again</text>
  <line x1="995" y1="156" x2="1080" y2="205" stroke="#3b82f6" stroke-width="3"/>
  <line x1="995" y1="276" x2="1080" y2="239" stroke="#8b5cf6" stroke-width="3"/>

  <circle cx="1100" cy="396" r="35" fill="#fff1f2" stroke="#ef4444" stroke-width="3"/>
  <path d="M1084 380 L1116 412 M1116 380 L1084 412" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
  <text x="1160" y="392" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="500" fill="#172033">DISCARD</text>
  <text x="1160" y="417" font-family="ui-sans-serif, system-ui" font-size="14" fill="#64748b">this history became impossible</text>
  <line x1="995" y1="396" x2="1065" y2="396" stroke="#f59e0b" stroke-width="3"/>
  <text x="1030" y="405" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="25" fill="#f59e0b">→</text>

  <g filter="url(#shadow)">
    <rect x="1300" y="185" width="95" height="74" rx="15" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  </g>
  <text x="1348" y="216" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="500" fill="#172033">LIVE</text>
  <text x="1348" y="239" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" fill="#475569">HEAD</text>
  <path d="M1255 222 H1300" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="1278" y="231" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="25" fill="#64748b">→</text>

  <text x="720" y="474" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="16" fill="#475569">Stack versions are logical heads into a shared graph—not complete copied stacks.</text>
</svg>
