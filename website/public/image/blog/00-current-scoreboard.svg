<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="800" viewBox="0 0 1440 800" role="img" aria-labelledby="title desc">
  <title id="title">Latest Rust core compared with C</title>
  <desc id="desc">Three paired charts compare raw parsing throughput, tree traversal throughput, ast-grep outline CPU, and peak resident memory. Rust is 29.74 percent faster at parsing, 10.16 percent faster at traversal, and uses 22.2 percent less ast-grep CPU, while using somewhat more peak memory.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1440" height="800" rx="24" fill="#f8fafc"/>
  <text x="60" y="58" font-family="ui-sans-serif, system-ui" font-size="29" font-weight="500" fill="#172033">Latest Rust core versus C</text>
  <text x="60" y="90" font-family="ui-sans-serif, system-ui" font-size="17" fill="#64748b">Three finish lines, measured separately at the current endpoint</text>

  <g transform="translate(1110 47)">
    <rect x="0" y="0" width="18" height="18" rx="4" fill="#64748b"/>
    <text x="29" y="15" font-family="ui-sans-serif, system-ui" font-size="16" fill="#334155">C / normal</text>
    <rect x="145" y="0" width="18" height="18" rx="4" fill="#f97316"/>
    <text x="174" y="15" font-family="ui-sans-serif, system-ui" font-size="16" fill="#334155">Rust</text>
  </g>

  <text x="60" y="132" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="500" fill="#334155">PERFORMANCE</text>
  <text x="1035" y="132" font-family="ui-sans-serif, system-ui" font-size="18" font-weight="500" fill="#334155">PEAK RSS</text>
  <text x="1035" y="157" font-family="ui-sans-serif, system-ui" font-size="14" fill="#64748b">MiB · shorter is smaller</text>
  <line x1="985" y1="122" x2="985" y2="738" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Raw parsing -->
  <g filter="url(#shadow)">
    <rect x="40" y="162" width="920" height="168" rx="18" fill="#ffffff"/>
    <rect x="1008" y="162" width="392" height="168" rx="18" fill="#ffffff"/>
  </g>
  <text x="68" y="198" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="500" fill="#172033">Raw parsing</text>
  <text x="68" y="223" font-family="ui-sans-serif, system-ui" font-size="15" fill="#64748b">Throughput index · C = 100 · higher is better</text>
  <text x="184" y="262" text-anchor="end" font-family="ui-sans-serif, system-ui" font-size="16" fill="#334155">C</text>
  <rect x="205" y="242" width="430" height="26" rx="6" fill="#64748b"/>
  <text x="650" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#334155">100</text>
  <text x="184" y="304" text-anchor="end" font-family="ui-sans-serif, system-ui" font-size="16" fill="#334155">Rust</text>
  <rect x="205" y="284" width="558" height="26" rx="6" fill="#f97316"/>
  <text x="778" y="304" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#334155">129.74</text>
  <text x="872" y="278" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="25" font-weight="500" fill="#172033">+29.74%</text>
  <text x="872" y="303" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" fill="#64748b">faster</text>

  <text x="1035" y="194" font-family="ui-sans-serif, system-ui" font-size="15" fill="#64748b">Range across seven languages</text>
  <text x="1054" y="239" font-family="ui-sans-serif, system-ui" font-size="15" fill="#334155">C</text>
  <line x1="1132" y1="234" x2="1262" y2="234" stroke="#64748b" stroke-width="10" stroke-linecap="round"/>
  <circle cx="1132" cy="234" r="6" fill="#64748b"/>
  <circle cx="1262" cy="234" r="6" fill="#64748b"/>
  <text x="1380" y="257" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#334155">8.48–21.41</text>
  <text x="1054" y="287" font-family="ui-sans-serif, system-ui" font-size="15" fill="#334155">Rust</text>
  <line x1="1131" y1="282" x2="1305" y2="282" stroke="#f97316" stroke-width="10" stroke-linecap="round"/>
  <circle cx="1131" cy="282" r="6" fill="#f97316"/>
  <circle cx="1305" cy="282" r="6" fill="#f97316"/>
  <text x="1380" y="305" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#334155">8.42–25.70</text>

  <!-- Tree traversal -->
  <g filter="url(#shadow)">
    <rect x="40" y="350" width="920" height="168" rx="18" fill="#ffffff"/>
    <rect x="1008" y="350" width="392" height="168" rx="18" fill="#ffffff"/>
  </g>
  <text x="68" y="386" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="500" fill="#172033">Tree traversal + common reads</text>
  <text x="68" y="411" font-family="ui-sans-serif, system-ui" font-size="15" fill="#64748b">Throughput index · C = 100 · higher is better</text>
  <text x="184" y="450" text-anchor="end" font-family="ui-sans-serif, system-ui" font-size="16" fill="#334155">C</text>
  <rect x="205" y="430" width="430" height="26" rx="6" fill="#64748b"/>
  <text x="650" y="450" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#334155">100</text>
  <text x="184" y="492" text-anchor="end" font-family="ui-sans-serif, system-ui" font-size="16" fill="#334155">Rust</text>
  <rect x="205" y="472" width="474" height="26" rx="6" fill="#f97316"/>
  <text x="694" y="492" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#334155">110.16</text>
  <text x="872" y="466" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="25" font-weight="500" fill="#172033">+10.16%</text>
  <text x="872" y="491" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" fill="#64748b">faster</text>

  <text x="1054" y="429" font-family="ui-sans-serif, system-ui" font-size="15" fill="#334155">C</text>
  <rect x="1132" y="410" width="153" height="24" rx="6" fill="#64748b"/>
  <text x="1378" y="428" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#334155">20.38</text>
  <text x="1054" y="477" font-family="ui-sans-serif, system-ui" font-size="15" fill="#334155">Rust</text>
  <rect x="1132" y="458" width="167" height="24" rx="6" fill="#f97316"/>
  <text x="1378" y="476" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#334155">22.20</text>

  <!-- ast-grep -->
  <g filter="url(#shadow)">
    <rect x="40" y="538" width="920" height="182" rx="18" fill="#ffffff"/>
    <rect x="1008" y="538" width="392" height="182" rx="18" fill="#ffffff"/>
  </g>
  <text x="68" y="574" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="500" fill="#172033">Complete ast-grep outline</text>
  <text x="68" y="599" font-family="ui-sans-serif, system-ui" font-size="15" fill="#64748b">User CPU seconds on opencode · lower is better</text>
  <text x="184" y="638" text-anchor="end" font-family="ui-sans-serif, system-ui" font-size="16" fill="#334155">Normal</text>
  <rect x="205" y="618" width="530" height="26" rx="6" fill="#64748b"/>
  <text x="750" y="638" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#334155">1.233 s</text>
  <text x="184" y="680" text-anchor="end" font-family="ui-sans-serif, system-ui" font-size="16" fill="#334155">Rust</text>
  <rect x="205" y="660" width="413" height="26" rx="6" fill="#f97316"/>
  <text x="633" y="680" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#334155">0.960 s</text>
  <text x="872" y="654" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="25" font-weight="500" fill="#172033">−22.2%</text>
  <text x="872" y="679" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" fill="#64748b">user CPU</text>

  <text x="1054" y="617" font-family="ui-sans-serif, system-ui" font-size="15" fill="#334155">Normal</text>
  <rect x="1132" y="598" width="199" height="24" rx="6" fill="#64748b"/>
  <text x="1380" y="616" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#334155">26.52</text>
  <text x="1054" y="665" font-family="ui-sans-serif, system-ui" font-size="15" fill="#334155">Rust</text>
  <rect x="1132" y="646" width="258" height="24" rx="6" fill="#f97316"/>
  <text x="1380" y="696" text-anchor="end" font-family="ui-sans-serif, system-ui" font-size="15" fill="#334155">34.43 · +7.92 MiB</text>

  <text x="720" y="765" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="15" fill="#64748b">Parser and traversal: 40 fixtures across seven languages · ast-grep: opencode, one worker · latest Rust compared directly with C</text>
</svg>
