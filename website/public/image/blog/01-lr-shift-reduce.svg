<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850" role="img" aria-labelledby="title desc">
  <title id="title">Six LR parser actions for the expression 1 plus 2</title>
  <desc id="desc">A step trace shows the lookahead token, parse-table action, resulting stack, and syntax-tree effect for three shifts, two reductions, and acceptance.</desc>
  <defs>
    <style>
      .title{font-family:Arial,sans-serif;font-size:30px;font-weight:700;fill:#172033}
      .subtitle{font-family:Arial,sans-serif;font-size:18px;font-weight:400;fill:#475569}
      .head{font-family:Arial,sans-serif;font-size:17px;font-weight:700;fill:#334155;letter-spacing:.5px}
      .body{font-family:Arial,sans-serif;font-size:19px;font-weight:500;fill:#172033}
      .small{font-family:Arial,sans-serif;font-size:16px;font-weight:500;fill:#475569}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:17px;font-weight:600;fill:#172033}
      .row{fill:#ffffff;stroke:#d7dce3;stroke-width:1.5}
      .row-alt{fill:#f6f8fb;stroke:#d7dce3;stroke-width:1.5}
      .shift{fill:#dff3ff;stroke:#1479a8;stroke-width:2}
      .reduce{fill:#e0f5e8;stroke:#23834b;stroke-width:2}
      .accept{fill:#eee8ff;stroke:#6d55b8;stroke-width:2}
      .divider{stroke:#cbd5e1;stroke-width:1.5}
    </style>
  </defs>

  <rect width="1400" height="850" rx="24" fill="#faf8f3"/>
  <text class="title" x="55" y="54">One lookahead, six table actions</text>
  <text class="subtitle" x="55" y="84">A shift consumes input. A reduction changes the stack and tree while the lookahead stays put.</text>

  <text class="head" x="70" y="135">STEP</text>
  <text class="head" x="165" y="135">LOOKAHEAD</text>
  <text class="head" x="365" y="135">TABLE SAYS</text>
  <text class="head" x="620" y="135">STACK AFTER THE ACTION</text>
  <text class="head" x="1130" y="135">TREE EFFECT</text>
  <line class="divider" x1="55" y1="150" x2="1345" y2="150"/>

  <rect class="row" x="55" y="166" width="1290" height="94" rx="14"/>
  <text class="body" x="82" y="222">1</text>
  <text class="mono" x="165" y="222">number("1")</text>
  <rect class="shift" x="352" y="185" width="210" height="54" rx="12"/>
  <text class="body" x="388" y="219">shift to state 3</text>
  <text class="mono" x="620" y="222">0 — number("1") — 3</text>
  <text class="body" x="1130" y="211">make leaf</text>
  <text class="small" x="1130" y="235">number("1")</text>

  <rect class="row-alt" x="55" y="270" width="1290" height="94" rx="14"/>
  <text class="body" x="82" y="326">2</text>
  <text class="mono" x="165" y="326">"+"</text>
  <rect class="reduce" x="352" y="282" width="210" height="68" rx="12"/>
  <text class="body" x="375" y="311">reduce number</text>
  <text class="small" x="375" y="335">to expression</text>
  <text class="mono" x="620" y="326">0 — expression("1") — 2</text>
  <text class="body" x="1130" y="315">wrap leaf</text>
  <text class="small" x="1130" y="339">lookahead unchanged</text>

  <rect class="row" x="55" y="374" width="1290" height="94" rx="14"/>
  <text class="body" x="82" y="430">3</text>
  <text class="mono" x="165" y="430">"+"</text>
  <rect class="shift" x="352" y="393" width="210" height="54" rx="12"/>
  <text class="body" x="388" y="427">shift to state 4</text>
  <text class="mono" x="620" y="430">0 — expression — 2 — "+" — 4</text>
  <text class="body" x="1130" y="419">make leaf</text>
  <text class="small" x="1130" y="443">"+"</text>

  <rect class="row-alt" x="55" y="478" width="1290" height="94" rx="14"/>
  <text class="body" x="82" y="534">4</text>
  <text class="mono" x="165" y="534">number("2")</text>
  <rect class="shift" x="352" y="497" width="210" height="54" rx="12"/>
  <text class="body" x="388" y="531">shift to state 5</text>
  <text class="mono" x="620" y="534">… — "+" — 4 — number("2") — 5</text>
  <text class="body" x="1130" y="523">make leaf</text>
  <text class="small" x="1130" y="547">number("2")</text>

  <rect class="row" x="55" y="582" width="1290" height="94" rx="14"/>
  <text class="body" x="82" y="638">5</text>
  <text class="mono" x="165" y="638">end-of-file</text>
  <rect class="reduce" x="352" y="594" width="210" height="68" rx="12"/>
  <text class="body" x="375" y="623">reduce 3 children</text>
  <text class="small" x="375" y="647">to expression</text>
  <text class="mono" x="620" y="638">0 — expression("1 + 2") — 2</text>
  <text class="body" x="1130" y="627">make parent</text>
  <text class="small" x="1130" y="651">lookahead unchanged</text>

  <rect class="row-alt" x="55" y="686" width="1290" height="94" rx="14"/>
  <text class="body" x="82" y="742">6</text>
  <text class="mono" x="165" y="742">end-of-file</text>
  <rect class="accept" x="352" y="705" width="210" height="54" rx="12"/>
  <text class="body" x="427" y="739">accept</text>
  <text class="mono" x="620" y="742">0 — expression("1 + 2") — 2</text>
  <text class="body" x="1130" y="742">return root</text>

  <rect class="shift" x="55" y="806" width="18" height="18" rx="4"/>
  <text class="small" x="83" y="821">shift consumes one token</text>
  <rect class="reduce" x="300" y="806" width="18" height="18" rx="4"/>
  <text class="small" x="328" y="821">reduce consumes no token</text>
  <rect class="accept" x="585" y="806" width="18" height="18" rx="4"/>
  <text class="small" x="613" y="821">accept returns the completed subtree</text>
</svg>
